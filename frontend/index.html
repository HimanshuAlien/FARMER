<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kerala Farmer Advisory System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;700&family=Roboto&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(120deg, #a8e063 0%, #56ab2f 100%);
            font-family: 'Roboto', sans-serif;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: #fefefe;
            border-radius: 12px;
            padding: 2.5rem 3rem;
            box-shadow: 0 8px 25px rgba(39, 61, 8, 0.35);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Spectral', serif;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.6rem;
            color: #2e7d32;
            letter-spacing: 1.2px;
        }

        p.subtitle {
            font-size: 0.9rem;
            margin-bottom: 2rem;
            color: #4a6f28;
            font-style: italic;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #3b5323;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.6rem 1rem;
            margin-bottom: 1.2rem;
            border: 2px solid #a9d18e;
            border-radius: 30px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
            outline-offset: 2px;
        }

        input:focus {
            border-color: #558b2f;
            outline: none;
            box-shadow: 0 0 8px rgba(85, 139, 47, 0.5);
        }

        button {
            width: 100%;
            background-color: #558b2f;
            color: white;
            font-weight: 700;
            padding: 0.8rem 0;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(85, 139, 47, 0.4);
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #33691e;
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: -1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .success-message {
            color: #2e7d32;
            font-weight: 600;
            text-align: center;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .register-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #4a6f28;
        }

        .register-link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <section class="container">
        <h1>Kerala Farmer Advisory</h1>
        <p class="subtitle">Welcome back! Log in to continue.</p>
        <form id="loginForm" novalidate>
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@domain.com" required />
            <div id="emailError" class="error-message"></div>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
            <div id="passwordError" class="error-message"></div>

            <button type="submit">Login</button>

            <div id="formError" class="error-message"></div>
            <div id="formSuccess" class="success-message"></div>
        </form>
        <div class="register-link">
            New user? <a href="register.html">Register here</a>
        </div>
    </section>

    <script>
        const loginForm = document.getElementById('loginForm');

        function showError(id, msg) {
            document.getElementById(id).textContent = msg;
        }
        function clearErrors() {
            ['emailError', 'passwordError', 'formError', 'formSuccess'].forEach(id => {
                document.getElementById(id).textContent = '';
            });
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const email = loginForm.email.value.trim();
            const password = loginForm.password.value;

            let valid = true;
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                showError('emailError', 'Please enter a valid email address.');
                valid = false;
            }
            if (password.length === 0) {
                showError('passwordError', 'Please enter your password.');
                valid = false;
            }
            if (!valid) return;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError('formError', data.message || 'Login failed.');
                } else {
                    showError('formSuccess', 'Login successful! Redirecting...');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                }
            } catch {
                showError('formError', 'Server error, please try again later.');
            }
        });
    </script>
</body>

</html>
