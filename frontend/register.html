<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kerala Farmer Advisory System - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;700&family=Roboto&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(120deg, #a8e063 0%, #56ab2f 100%);
            font-family: 'Roboto', sans-serif;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: #fefefe;
            border-radius: 12px;
            padding: 2.5rem 3rem;
            box-shadow: 0 8px 25px rgba(39, 61, 8, 0.35);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Spectral', serif;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.6rem;
            color: #2e7d32;
            letter-spacing: 1.2px;
        }

        p.subtitle {
            font-size: 0.9rem;
            margin-bottom: 2rem;
            color: #4a6f28;
            font-style: italic;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #3b5323;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.6rem 1rem;
            margin-bottom: 1.2rem;
            border: 2px solid #a9d18e;
            border-radius: 30px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
            outline-offset: 2px;
        }

        input:focus {
            border-color: #558b2f;
            outline: none;
            box-shadow: 0 0 8px rgba(85, 139, 47, 0.5);
        }

        button {
            width: 100%;
            background-color: #558b2f;
            color: white;
            font-weight: 700;
            padding: 0.8rem 0;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(85, 139, 47, 0.4);
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #33691e;
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: -1rem;
            margin-bottom: 1rem;
        }

        .success-message {
            color: #2e7d32;
            font-weight: 600;
            text-align: center;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .login-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #4a6f28;
        }

        .login-link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <section class="container">
        <h1>Kerala Farmer Advisory</h1>
        <p class="subtitle">Empowering farmers with AI-driven farming insights</p>
        <form id="registerForm" novalidate>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required minlength="3" />
            <div id="usernameError" class="error-message"></div>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@domain.com" required />
            <div id="emailError" class="error-message"></div>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required
                minlength="6" />
            <div id="passwordError" class="error-message"></div>

            <button type="submit">Register</button>

            <div id="formError" class="error-message"></div>
            <div id="formSuccess" class="success-message"></div>
        </form>
        <div class="login-link">
            Already a member? <a href="index.html">Login here</a>
        </div>
    </section>

    <script>
        const registerForm = document.getElementById('registerForm');

        function showError(id, msg) {
            document.getElementById(id).textContent = msg;
        }
        function clearErrors() {
            ['usernameError', 'emailError', 'passwordError', 'formError', 'formSuccess'].forEach(id => {
                document.getElementById(id).textContent = '';
            });
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const username = registerForm.username.value.trim();
            const email = registerForm.email.value.trim();
            const password = registerForm.password.value;

            let valid = true;
            if (username.length < 3) {
                showError('usernameError', 'Username must be at least 3 characters.');
                valid = false;
            }
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                showError('emailError', 'Please enter a valid email address.');
                valid = false;
            }
            if (password.length < 6) {
                showError('passwordError', 'Password must be at least 6 characters.');
                valid = false;
            }
            if (!valid) return;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError('formError', data.message || 'Registration failed.');
                } else {
                    showError('formSuccess', 'Registration successful! Redirecting to dashboard...');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                }
            } catch {
                showError('formError', 'Server error, please try again later.');
            }
        });
    </script>
</body>

</html>
